{{- range .Values.routes }}
{{- $backend := default dict .backend }}
{{- $middlewares := default list .middlewares }}
{{- if $backend.host }}
{{- $hostMiddleware := dict "name" (printf "%s-%s-host" (include "traefik-reverse-proxy-routes.fullname" $) .name) "namespace" $.Release.Namespace }}
{{- $middlewares = append $middlewares $hostMiddleware }}
{{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "traefik-reverse-proxy-routes.fullname" $ }}-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "traefik-reverse-proxy-routes.labels" $ | nindent 4 }}
spec:
  routes:
    - match: Host(`{{ .host }}`)
      kind: Rule
      services:
        - name: {{ include "traefik-reverse-proxy-routes.fullname" $ }}-{{ .name }}
          port: {{ .port }}
          {{- if $backend.scheme }}
          scheme: {{ $backend.scheme }}
          {{- end }}
          {{- if or $backend.insecureSkipVerify $backend.caSecret }}
          serversTransport: {{ include "traefik-reverse-proxy-routes.fullname" $ }}-{{ .name }}
          {{- end }}
      {{- if $middlewares }}
      middlewares:
        {{- toYaml $middlewares | nindent 8 }}
      {{- end }}
  tls: {}
{{- end }}
