{{- range .Values.routes }}
{{- $backend := default dict .backend }}
{{- if $backend.host }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "traefik-reverse-proxy-routes.fullname" $ }}-{{ .name }}-host
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "traefik-reverse-proxy-routes.labels" $ | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      Host: {{ $backend.host }}
{{- end }}
{{- end }}
