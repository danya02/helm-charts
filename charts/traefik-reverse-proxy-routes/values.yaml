entryPoints:
  - websecure

tls:
  enabled: true
  certResolver: ""  # e.g. "letsencrypt"
  secretName: ""    # e.g. "my-wildcard-tls"

routes:
  - name: example-ip
    host: example.example.com
    ip: 10.0.1.100   # external IP — generates a ClusterIP Service + Endpoints
    port: 80
    # Optional per-route overrides:
    # entryPoints: [web, websecure]
    # tls:
    #   enabled: false
    # middlewares:
    #   - name: my-middleware
    #     namespace: default
    # backend:
    #   scheme: https             # force HTTPS (or h2c) to the backend; default is HTTP
    #   insecureSkipVerify: true  # skip backend TLS certificate verification
    #   caSecret: ""              # Secret name containing ca.crt for backend verification
    #   host: ""                  # override the Host header sent to the backend

  - name: example-dns
    host: other.example.com
    externalName: myserver.internal.corp  # external hostname — generates an ExternalName Service
    port: 443
    # backend:
    #   scheme: https
    #   insecureSkipVerify: false
    #   caSecret: "my-internal-ca"
    #   host: "myserver.internal.corp"  # send this Host header instead of the public hostname
